name: CountyTracker
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    iOS: 16.0
settings:
  base:
    SWIFT_VERSION: 5.0
targets:
  CountyTracker:
    type: application
    platform: iOS
    sources:
      - path: CountyTrackerIOS
        excludes:
          - README.md
          - counties.json
          - county_centroids.json
      - path: CountyTrackerIOS/counties.json
        buildPhase: resources
      - path: CountyTrackerIOS/county_centroids.json
        buildPhase: resources
    info:
      path: CountyTrackerIOS/Info.plist
      properties:
        CFBundleDevelopmentRegion: en
        CFBundleDisplayName: CountyTracker
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: CountyTracker uses your location to record counties you've visited.
        NSLocationAlwaysAndWhenInUseUsageDescription: CountyTracker uses your location in the background to automatically record counties as you drive through them — without draining your battery.
        UIBackgroundModes:
          - location
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: MapChart Save File
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.plain-text
              - public.json
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bqrosen.CountyTracker
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: CLGKHJH2MY
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets: []
